<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstrixMC Minecraft Server</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: #000000;
            color: #4A90E2;
            min-height: 100vh;
        }
        
        header {
            background: #0052A3;
            padding: 20px 0;
            box-shadow: 0 4px 6px rgba(74, 144, 226, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #FFFFFF;
        }
        
        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
        }
        
        .nav-links a {
            color: #FFFFFF;
            text-decoration: none;
            transition: color 0.3s;
            cursor: pointer;
        }
        
        .nav-links a:hover {
            color: #4A90E2;
        }
        
        .auth-buttons {
            display: flex;
            gap: 10px;
        }
        
        button {
            padding: 10px 20px;
            border: 2px solid #4A90E2;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .btn-login {
            background: transparent;
            color: #4A90E2;
        }
        
        .btn-login:hover {
            background: #4A90E2;
            color: #000000;
            transform: translateY(-2px);
        }
        
        .btn-register {
            background: #4A90E2;
            color: #000000;
        }
        
        .btn-register:hover {
            background: #0074D9;
            transform: translateY(-2px);
        }
        
        .hero {
            text-align: center;
            padding: 80px 20px;
        }
        
        .hero h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 8px rgba(74, 144, 226, 0.5);
            color: #4A90E2;
        }
        
        .hero p {
            font-size: 20px;
            margin-bottom: 30px;
            color: #CCCCCC;
        }
        
        .server-info {
            background: rgba(74, 144, 226, 0.1);
            border: 2px solid #4A90E2;
            padding: 30px;
            border-radius: 10px;
            max-width: 600px;
            margin: 0 auto;
            margin-bottom: 40px;
        }
        
        .server-ip {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #4A90E2;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }
        
        .ip-text {
            font-size: 24px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            color: #4A90E2;
        }
        
        .btn-copy {
            background: #4A90E2;
            color: #000000;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .btn-copy:hover {
            background: #0074D9;
            transform: translateY(-2px);
        }
        
        .btn-copy.copied {
            background: #00FF00;
            color: #000000;
        }
        
        .player-info {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .player-stat {
            text-align: center;
        }
        
        .player-count {
            font-size: 32px;
            font-weight: bold;
            color: #4A90E2;
        }
        
        .player-label {
            font-size: 14px;
            color: #CCCCCC;
            margin-top: 5px;
        }
        
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #4A90E2;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .modal-content {
            background: #1a1a1a;
            border: 2px solid #4A90E2;
            margin: 10% auto;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 4px 6px rgba(74, 144, 226, 0.3);
            animation: slideIn 0.3s;
        }
        
        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .close {
            color: #4A90E2;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s;
        }
        
        .close:hover {
            color: #FFFFFF;
        }
        
        .modal h2 {
            margin-bottom: 20px;
            color: #4A90E2;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #4A90E2;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #4A90E2;
            border-radius: 5px;
            background: #2a2a2a;
            color: #4A90E2;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #FFFFFF;
            box-shadow: 0 0 5px rgba(74, 144, 226, 0.5);
        }
        
        .form-group button {
            width: 100%;
            padding: 12px;
            background: #4A90E2;
            color: #000000;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .form-group button:hover {
            background: #0074D9;
            transform: translateY(-2px);
        }
        
        .form-footer {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #CCCCCC;
        }
        
        .form-footer a {
            color: #4A90E2;
            cursor: pointer;
            text-decoration: underline;
        }
        
        .form-footer a:hover {
            color: #FFFFFF;
        }
        
        footer {
            background: #0052A3;
            padding: 40px 20px;
            text-align: center;
            margin-top: 60px;
            border-top: 2px solid #4A90E2;
        }
        
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .footer-links a {
            color: #FFFFFF;
            text-decoration: none;
            transition: color 0.3s;
            font-weight: bold;
        }
        
        .footer-links a:hover {
            color: #4A90E2;
        }
        
        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .social-links a {
            width: 40px;
            height: 40px;
            background: #4A90E2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000000;
            text-decoration: none;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .social-links a:hover {
            background: #FFFFFF;
            transform: translateY(-3px);
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #4A90E2;
            color: #000000;
            padding: 15px 20px;
            border-radius: 5px;
            display: none;
            z-index: 2000;
            animation: slideInRight 0.3s;
            font-weight: bold;
        }
        
        @keyframes slideInRight {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        @media (max-width: 768px) {
            .nav-links {
                gap: 15px;
                font-size: 14px;
            }
            
            .hero h1 {
                font-size: 32px;
            }
            
            .hero p {
                font-size: 16px;
            }
            
            .server-ip {
                flex-direction: column;
                align-items: stretch;
            }
            
            .btn-copy {
                width: 100%;
            }
            
            .player-info {
                gap: 15px;
            }
        }
    </style>
</head>
